<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex" />
		<title>%sveltekit.status% | Star Tech Phone Repairs</title>
		<style>
			body {
				margin: 0;
				font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				background: #f7fafc;
				color: #0f172a;
			}
			main {
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 32px;
			}
			section {
				max-width: 680px;
				text-align: center;
			}
			p:first-child {
				color: #0ea5e9;
				font-weight: 700;
				text-transform: uppercase;
				letter-spacing: 0.08em;
			}
			h1 {
				font-size: clamp(2.25rem, 5vw, 4rem);
				margin: 16px 0;
			}
			a {
				display: inline-block;
				margin-top: 24px;
				border-radius: 8px;
				background: #0ea5e9;
				color: white;
				font-weight: 700;
				padding: 12px 18px;
				text-decoration: none;
			}
		</style>
	</head>
	<body>
		<main>
			<section>
				<p>Error %sveltekit.status%</p>
				<h1>We could not load that page</h1>
				<p>%sveltekit.error.message%</p>
				<a href="/">Go home</a>
			</section>
		</main>
	</body>
</html>
